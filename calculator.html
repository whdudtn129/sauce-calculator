<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>소스 비율 계산기</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#ff6b35">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="소스계산기">
  <link rel="apple-touch-icon" href="./icon.svg">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      padding: 32px 28px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 24px;
      text-align: center;
    }

    .menu-buttons {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
    }

    .menu-btn {
      flex: 1;
      padding: 14px 0;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      background: #fff;
      font-size: 15px;
      font-weight: 600;
      color: #888;
      cursor: pointer;
      transition: all 0.2s;
    }

    .menu-btn:hover {
      border-color: #ff6b35;
      color: #ff6b35;
    }

    .menu-btn.active {
      background: #ff6b35;
      border-color: #ff6b35;
      color: #fff;
    }

    .input-section {
      display: none;
    }

    .input-section.visible {
      display: block;
    }

    .input-label {
      font-size: 13px;
      font-weight: 600;
      color: #555;
      margin-bottom: 8px;
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 13px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #ff6b35;
    }

    .input-row .unit {
      font-size: 14px;
      color: #888;
      min-width: 20px;
    }

    .result-section {
      display: none;
    }

    .result-section.visible {
      display: block;
    }

    .result-title {
      font-size: 13px;
      font-weight: 600;
      color: #555;
      margin-bottom: 12px;
    }

    .result-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .result-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #fff8f5;
      border: 1px solid #ffe0d0;
      border-radius: 10px;
      padding: 13px 16px;
    }

    .result-item .name {
      font-size: 15px;
      font-weight: 600;
      color: #333;
    }

    .result-item .value {
      font-size: 16px;
      font-weight: 700;
      color: #ff6b35;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>소스 비율 계산기</h1>

    <div class="menu-buttons">
      <button class="menu-btn" onclick="selectMenu('spicy-tuna')">스파이시 투나</button>
      <button class="menu-btn" onclick="selectMenu('salmon-chop')">살몬 찹</button>
    </div>

    <div class="input-section" id="input-section">
      <div class="input-label" id="input-label">무게 입력</div>
      <div class="input-row">
        <input
          type="number"
          id="weight-input"
          placeholder="예: 1000"
          min="1"
          oninput="calculate()"
        >
        <span class="unit">g</span>
      </div>
    </div>

    <div class="result-section" id="result-section">
      <div class="result-title">소스 비율 결과</div>
      <div class="result-list" id="result-list"></div>
    </div>
  </div>

  <script>
    const recipes = {
      'spicy-tuna': {
        label: '스파이시 투나 무게 입력',
        ingredients: [
          { name: '간장', per1kg: 25 },
          { name: '라유', per1kg: 25 },
          { name: '스리라차', per1kg: 25 },
          { name: '초장', per1kg: 180 },
          { name: '시치미', per1kg: 5 },
        ]
      },
      'salmon-chop': {
        label: '살몬 무게 입력',
        ingredients: [
          { name: '벌크마요', per1kg: 100 },
          { name: '스리라차', per1kg: 20 },
        ]
      }
    };

    let currentMenu = null;

    function selectMenu(menu) {
      currentMenu = menu;

      document.querySelectorAll('.menu-btn').forEach((btn, i) => {
        btn.classList.toggle('active', (i === 0 && menu === 'spicy-tuna') || (i === 1 && menu === 'salmon-chop'));
      });

      document.getElementById('input-label').textContent = recipes[menu].label;
      document.getElementById('input-section').classList.add('visible');

      const input = document.getElementById('weight-input');
      input.value = '';
      input.focus();

      document.getElementById('result-section').classList.remove('visible');
      document.getElementById('result-list').innerHTML = '';
    }

    function calculate() {
      if (!currentMenu) return;

      const weight = parseFloat(document.getElementById('weight-input').value);
      const resultSection = document.getElementById('result-section');
      const resultList = document.getElementById('result-list');

      if (!weight || weight <= 0) {
        resultSection.classList.remove('visible');
        resultList.innerHTML = '';
        return;
      }

      const ratio = weight / 1000;
      const ingredients = recipes[currentMenu].ingredients;

      resultList.innerHTML = ingredients.map(item => {
        const amount = (item.per1kg * ratio).toFixed(1);
        const display = amount.endsWith('.0') ? parseInt(amount) : amount;
        return `
          <div class="result-item">
            <span class="name">${item.name}</span>
            <span class="value">${display}g</span>
          </div>
        `;
      }).join('');

      resultSection.classList.add('visible');
    }
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
